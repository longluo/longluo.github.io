<body>

<span class="caption">
        Read more about <a href="http://www.longluo.me/blog/2023/05/05/pid/">PID controller</a>.
        The ball represent <a href="https://en.wikipedia.org/wiki/WALL-E">Wall-E</a>. Click to Set the Target.
        Let's FLY! The Red Line represent the thrusters in X and Y(红线表示当前X和Y轴的动力), the Blue is the Velocity(蓝线为当前速度),
        the Green is the Acceleration(绿线是当前加速度). 2副图表分别表示X和Y方向上的PID分量变化曲线图。
    </span>

<span class="control">
        <label for="kp" style="color: red;">Kp</label>
        <input type="range" id="slider_kp" min="0" max="100" value="5">
        <input type="number" id="kp" size="3" min="0" max="100" value="5">

        <label for="ki" style="color: red;">Ki</label>
        <input type="range" id="slider_ki" min="0" max="100" value="0.01">
        <input type="number" id="ki" size="3" min="0" max="100" value="0.01">

        <label for="kd" style="color: red;">Kd</label>
        <input type="range" id="slider_kd" min="0" max="100" value="10">
        <input type="number" id="kd" size="3" min="0" max="100" value="10">
    </span>

<canvas id="cvs_track"></canvas>

<div id="plot_pid_x"></div>

<div id="plot_pid_y"></div>
