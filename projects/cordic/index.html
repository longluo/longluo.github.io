<body>

<h1 class="heading">CORDIC Algorithm</h1>
<h3 class="author">By Long Luo</h3>

<section align="center">
    <!-- Inputs -->
    <p>
        请输入角度值(0 ~ 90°) :
        <span>
        <input id="alpha" type="number" min="0" max="90" step="0.01" value="70"
               style="width:100px; height: 40px; font-size:36px;">
        <output id="errorAlpha"></output>
        </span>
    </p>

    <p>
        请输入迭代次数(1 ~ 666) :
        <span>
            <input id="iteration" type="number" min="1" max="666" step="1" value="66"
                   style="width:100px; height: 40px; font-size:36px;">
            <output id="errorIteration"></output>
        </span>
    </p>

    <p>
        <button class="button buttonReset" onclick="run()">Run</button>
<!--        <button class="button buttonClear" onclick="clearTable()">Clear</button>-->
    </p>

    <!-- Results -->
    <div align="center">
        <table>
            <tr>
                <th></th>
                <th>
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>cos</mi>
                        <mo>(</mo>
                        <mi>x</mi>
                        <mo>)</mo>
                    </math>
                </th>
                <th>
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>sin</mi>
                        <mo>(</mo>
                        <mi>x</mi>
                        <mo>)</mo>
                    </math>
                </th>
                <th>
                    <math xmlns="http://www.w3.org/1998/Math/MathML">
                        <mi>tan</mi>
                        <mo>(</mo>
                        <mi>x</mi>
                        <mo>)</mo>
                    </math>
                </th>
            </tr>

            <tr>
                <th>CORDIC Algorithm</th>
                <td class="table-output">
                    <output id="cordicCos"></output>
                </td>
                <td class="table-output">
                    <output id="cordicSin"></output>
                </td>
                <td class="table-output">
                    <output id="cordicTan"></output>
                </td>
            </tr>

            <tr>
                <th>JS Math</th>
                <td class="table-output">
                    <output id="jsCos"></output>
                </td>
                <td class="table-output">
                    <output id="jsSin"></output>
                </td>
                <td class="table-output">
                    <output id="jsTan"></output>
                </td>
            </tr>

            <tr>
                <th>差值(Difference)</th>
                <td class="table-output">
                    <output id="diffCos"></output>
                </td>
                <td class="table-output">
                    <output id="diffSin"></output>
                </td>
                <td class="table-output">
                    <output id="diffTan"></output>
                </td>
            </tr>
        </table>
    </div>

    <p>
        <output id="cordicTime"></output>
    </p>
</section>
